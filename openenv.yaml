name: my_env_v4
description: Echo environment with graded difficulty

tasks:
  - name: echo_easy
    description: Generate moderately long responses

  - name: echo_medium
    description: Generate longer detailed responses

  - name: echo_hard
    description: Generate very long and meaningful responses

environment:
  observation_space:
    type: object
    properties:
      echoed_message:
        type: string

  action_space:
    type: object
    properties:
      message:
        type: string

reward:
  type: float
  range: [0.0, 1.0]